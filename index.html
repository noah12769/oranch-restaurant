<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Ô Ranch — Steakhouse · Saint-Claude, Guadeloupe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink:    #16100A;
      --cream:  #F5EDE0;
      --cream2: #DCC89A;
      --stone:  #726860;
      --wood:   #D4942A;
      --ember:  #C04018;
      --green:  #3d6b35;
      --r: 18px;
    }

    html, body { width:100%; height:100%; background:var(--ink); overflow:hidden; }
    body { padding:10px; }

    .hero { display:flex; width:calc(100vw - 20px); height:calc(100vh - 20px); height:calc(100dvh - 20px); gap:10px; }

    /* LEFT */
    .hero__left { position:relative; flex:1; border-radius:var(--r); overflow:hidden; }
    .hero__left__bg {
      position:absolute; inset:0;
      background-image:url('images/un-cadre-authentique.jpg');
      background-size:cover; background-position:center 20%;
      transform:scale(1.02); transition:transform 8s ease;
    }
    .hero__left:hover .hero__left__bg { transform:scale(1.06); }
    .hero__left__overlay {
      position:absolute; inset:0;
      background:
        linear-gradient(to top,   rgba(22,16,10,.84) 0%, rgba(22,16,10,.1) 50%, transparent 100%),
        linear-gradient(to right, rgba(22,16,10,.4) 0%, transparent 60%),
        linear-gradient(to bottom,rgba(22,16,10,.48) 0%, transparent 30%);
    }

    /* NAV PILL */
    .nav {
      position:absolute; top:20px; left:20px; z-index:10;
      display:inline-flex; align-items:center; gap:4px;
      padding:9px 12px 9px 16px;
      background:rgba(16,10,6,.65); backdrop-filter:blur(24px); -webkit-backdrop-filter:blur(24px);
      border:1px solid rgba(200,185,165,.12); border-radius:999px;
      box-shadow:0 4px 24px rgba(0,0,0,.4);
      animation:fadeDown .7s .05s cubic-bezier(.16,1,.3,1) both;
    }
    .nav__burger { display:flex; flex-direction:column; gap:4.5px; cursor:pointer; padding:4px 6px; border-radius:999px; transition:background .2s; }
    .nav__burger:hover { background:rgba(235,224,202,.08); }
    .nav__burger span { display:block; width:18px; height:1.5px; background:var(--cream); }
    .nav__logo { font-family:'Cormorant Garamond',serif; font-weight:400; font-size:19px; letter-spacing:.26em; color:var(--cream); text-transform:uppercase; padding:0 4px 0 6px; text-decoration:none; }
    .nav__sep { width:1px; height:15px; background:rgba(200,185,165,.14); margin:0 6px; flex-shrink:0; }
    .nav__links { display:flex; align-items:center; gap:2px; list-style:none; }
    .nav__links a { display:block; font-family:'Jost',sans-serif; font-weight:300; font-size:10.5px; letter-spacing:.18em; text-transform:uppercase; color:rgba(235,224,202,.58); text-decoration:none; padding:7px 13px; border-radius:999px; transition:background .2s, color .2s; white-space:nowrap; }
    .nav__links a:hover { color:var(--cream); background:rgba(235,224,202,.1); }
    .nav__links a.active { color:var(--cream); background:rgba(235,224,202,.14); }

    /* HEADLINE */
    .hero__headline { position:absolute; bottom:48px; left:36px; z-index:10; line-height:.88; }
    .hero__headline h1 { font-family:'Cormorant Garamond',serif; font-weight:300; font-size:clamp(62px,8.5vw,108px); letter-spacing:-.01em; text-transform:uppercase; color:var(--cream); display:block; }
    .hero__headline h1:first-child { animation:headlineFade 2.2s 0.6s ease both; }
    .hero__headline h1:last-child  { animation:headlineFade 2.2s 1.1s ease both; }
    @keyframes headlineFade { from{opacity:0} to{opacity:1} }

    /* SOCIAL */
    .hero__social { position:absolute; bottom:52px; right:36px; z-index:10; display:flex; gap:18px; align-items:center; animation:fadeUp .7s .35s cubic-bezier(.16,1,.3,1) both; }
    .hero__social a { color:rgba(235,224,202,.45); transition:color .2s; text-decoration:none; display:flex; }
    .hero__social a:hover { color:var(--cream); }
    .hero__social svg { width:15px; height:15px; fill:currentColor; }

    /* RIGHT STRIP */
    .hero__right { width:min(27vw,350px); display:flex; flex-direction:column; flex-shrink:0; gap:10px; animation:revealR .85s .1s cubic-bezier(.16,1,.3,1) both; }

    /* PANELS */
    .panel { position:relative; flex:1; border-radius:var(--r); overflow:hidden; cursor:pointer; background:rgba(10,6,2,.78); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); display:block; text-decoration:none; }
    .panel__photo { position:absolute; inset:0; background-size:cover; background-position:center; transition:transform .7s cubic-bezier(.25,.46,.45,.94); }
    .panel:hover .panel__photo { transform:scale(1.05); }
    .panel--menu    .panel__photo { background-image:url('images/l-incontournable-tomahawk6.jpg'); background-position:center; }
    .panel--resy    .panel__photo { background-image:url('images/pina-colada-chantilly.jpg'); background-position:center 30%; }
    .panel--resto   .panel__photo { background-image:url('images/un-cadre-depaysant-installez.jpg'); background-position:center; }
    .panel__overlay { position:absolute; inset:0; background:linear-gradient(to top, rgba(22,16,10,.70) 0%, rgba(22,16,10,.05) 50%, transparent 100%); }
    .panel__label { position:absolute; bottom:16px; right:18px; z-index:5; display:flex; align-items:center; gap:8px; font-family:'Jost',sans-serif; font-weight:300; font-size:10px; letter-spacing:.22em; text-transform:uppercase; color:var(--cream2); transition:color .2s, gap .25s; }
    .panel:hover .panel__label { color:var(--cream); gap:13px; }
    .panel__label .arr { font-size:13px; transition:transform .25s; }
    .panel:hover .panel__label .arr { transform:translateX(3px); }

    /* ANIMATIONS */
    .hero__left { animation:revealL .85s cubic-bezier(.16,1,.3,1) both; }
    @keyframes revealL  { from{opacity:0;transform:scale(.97)} to{opacity:1;transform:scale(1)} }
    @keyframes revealR  { from{opacity:0;transform:translateX(16px)} to{opacity:1;transform:translateX(0)} }
    @keyframes fadeDown { from{opacity:0;transform:translateY(-10px)} to{opacity:1;transform:translateY(0)} }
    @keyframes fadeUp   { from{opacity:0;transform:translateY(22px)}  to{opacity:1;transform:translateY(0)} }

    /* ── RESPONSIVE ───────────────────────────────────────────── */
    @media (max-width: 900px) {
      .hero__right { width: min(32vw, 280px); }
      .hero__headline h1 { font-size: clamp(48px, 8vw, 80px); }
    }
    @media (max-width: 700px) {
      html, body { overflow: hidden; height: 100%; }
      body { padding: 8px; }
      .hero { flex-direction: column; width: calc(100vw - 16px); height: calc(100vh - 16px); height: calc(100dvh - 16px); gap: 8px; }
      .hero__left { flex: 7; min-height: 0; }
      .hero__right { flex: 3; min-height: 0; width: 100%; flex-direction: row; gap: 8px; }
      .panel__label { font-size: 9px; bottom: 10px; right: 12px; }
      .nav { padding: 8px 10px 8px 12px; gap: 2px; }
      .nav__logo { font-size: 16px; letter-spacing: .2em; }
      .nav__sep { margin: 0 4px; }
      .nav__links a { padding: 6px 8px; font-size: 9.5px; letter-spacing: .12em; }
      .hero__headline { bottom: 36px; left: 24px; }
      .hero__headline h1 { font-size: clamp(44px, 13vw, 68px); }
      .hero__social { bottom: 36px; right: 20px; gap: 14px; }
    }
    @media (max-width: 480px) {
      .nav { padding: 7px 9px 7px 12px; gap: 2px; }
      .nav__logo { font-size: 13px; letter-spacing: .15em; }
      .nav__sep { margin: 0 3px; }
      .nav__links a { font-size: 8px; letter-spacing: .09em; padding: 5px 6px; }
      .hero__right { height: 120px; }
      .panel__label { bottom: 12px; left: 12px; right: 12px; letter-spacing: .06em; flex-direction: column; align-items: flex-start; gap: 3px; overflow-wrap: break-word; }
      .hero__headline { bottom: 52px; left: 20px; }
      .hero__headline h1 { font-size: clamp(34px, 11vw, 50px); }
      .hero__social { bottom: 14px; right: 16px; gap: 12px; }
    }

    /* ── BURGER → CROIX ──────────────────────────────────── */
    .nav__burger span { transition: transform .35s cubic-bezier(.16,1,.3,1), opacity .25s; }
    .nav__burger.open span:nth-child(1) { transform: rotate(45deg) translate(4px, 4.5px); }
    .nav__burger.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
    .nav__burger.open span:nth-child(3) { transform: rotate(-45deg) translate(4px, -4.5px); }

    /* ── OVERLAY NAVIGATION ──────────────────────────────── */
    .nav-overlay {
      position: fixed; inset: 0; z-index: 9999;
      background: rgba(22,16,10,.97);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity .4s cubic-bezier(.16,1,.3,1);
    }
    .nav-overlay.open { opacity: 1; pointer-events: all; }
    .nav-overlay__close {
      position: absolute; top: 20px; left: 20px;
      width: 44px; height: 40px;
      background: rgba(16,10,6,.58); backdrop-filter: blur(22px); -webkit-backdrop-filter: blur(22px);
      border: 1px solid rgba(200,185,165,.1); border-radius: 999px;
      box-shadow: 0 4px 24px rgba(0,0,0,.35);
      cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0;
    }
    .nav-overlay__close span { position: absolute; display: block; width: 18px; height: 1.5px; background: var(--cream); }
    .nav-overlay__close span:nth-child(1) { transform: rotate(45deg); }
    .nav-overlay__close span:nth-child(2) { transform: rotate(-45deg); }
    .nav-overlay__links { display: flex; flex-direction: column; align-items: center; gap: 28px; width: 100%; padding: 0 20px; }
    .nav-overlay__links a {
      font-family: 'Cormorant Garamond', serif; font-weight: 300;
      font-size: clamp(28px, 8vw, 50px); letter-spacing: .05em; text-transform: uppercase;
      color: var(--cream); text-decoration: none;
      opacity: .45; transition: opacity .25s, letter-spacing .35s;
      display: block; text-align: center; width: 100%;
    }
    .nav-overlay__links a.active { opacity: .9; }
    .nav-overlay__links a:hover { opacity: 1; letter-spacing: .08em; }

    /* ── BOIS SUR LES CASES ─────────────────────────────── */
    #wood-bg { display:none; }
    .panel {
      background:
        linear-gradient(rgba(10,6,2,.52), rgba(10,6,2,.52)),
        url('images/wood-panel.jpg') center / cover;
    }
  </style>
</head>
<body>
<!-- Fond bois SVG procédural (test 1) -->

      <filter id="wf" x="0%" y="0%" width="100%" height="100%" color-interpolation-filters="sRGB">
        <feTurbulence type="fractalNoise" baseFrequency="0.006 0.15" numOctaves="6" seed="42"/>
        <feColorMatrix type="matrix" values="0.29 0 0 0 0.51  0.25 0 0 0 0.40  0.14 0 0 0 0.24  0 0 0 0 1"/>

    </defs>
    <rect width="100%" height="100%" filter="url(#wf)"/>

<section class="hero">

    <div class="hero__headline">

    <div class="hero__social">

  <div class="hero__right">

    <a href="about.html">Notre Restaurant</a>
  </nav>
</div>


<script>
(function(){
  var burger  = document.querySelector('.nav__burger');
  var overlay = document.getElementById('navOverlay');
  function openMenu()  { burger.classList.add('open');    overlay.classList.add('open');    document.body.style.overflow='hidden'; }
  function closeMenu() { burger.classList.remove('open'); overlay.classList.remove('open'); document.body.style.overflow=''; }
  function toggle()    { overlay.classList.contains('open') ? closeMenu() : openMenu(); }
  burger.addEventListener('click', toggle);
  document.querySelector('.nav-overlay__close').addEventListener('click', closeMenu);
  overlay.addEventListener('click', function(e){ if(e.target===overlay) closeMenu(); });
  document.addEventListener('keydown', function(e){ if(e.key==='Escape') closeMenu(); });
})();
</script>

<script>
/* Centre le panneau du hero sur le point focal de l'image, quel que soit l'écran */
(function(){
  var bg  = document.querySelector('.hero__left__bg');
  var box = document.querySelector('.hero__left');
  if (!bg || !box) return;

  var FY = 0.33; /* le panneau est à ~33% du haut de l'image */
  var imgRatio; /* largeur / hauteur naturelle */

  function applyPosition() {
    if (!imgRatio) return;
    var cw = box.offsetWidth;
    var ch = box.offsetHeight;
    /* avec cover, l'image remplit la largeur → hauteur = cw / ratio */
    var scaledH = cw / imgRatio;
    if (scaledH <= ch) { bg.style.backgroundPosition = 'center center'; return; }
    var focalPx  = FY * scaledH;           /* pixels depuis le haut de l'image */
    var topOffset = ch / 2 - focalPx;      /* décalage pour centrer ce point */
    var yPct = topOffset / (ch - scaledH); /* formule background-position */
    yPct = Math.max(0, Math.min(1, yPct));
    bg.style.backgroundPosition = 'center ' + (yPct * 100).toFixed(1) + '%';
  }

  var probe = new Image();
  probe.onload = function(){
    imgRatio = probe.naturalWidth / probe.naturalHeight;
    applyPosition();
    window.addEventListener('resize', applyPosition);
  };
  probe.src = 'images/un-cadre-authentique.jpg';
})();
</script>
